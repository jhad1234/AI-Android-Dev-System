name: Android AI-OS CI/CD Build Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Compile and Generate Installation APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17 (Required for modern Android Builds)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # فحص ذكي: يمنح الصلاحية للملفات الموجودة فعلياً فقط ولا يسبب أي انهيار إذا اختفى الـ jar
    - name: Grant Execute Permission for Existing Scripts
      run: |
        if [ -f "./gradlew" ]; then chmod +x ./gradlew; fi
        if [ -f "./gradle/wrapper/gradlew" ]; then chmod +x ./gradle/wrapper/gradlew; fi

    # التجميع المباشر عبر الشل لتفادي أي جدار حماية سحابي
    - name: Compile and Build Debug APK
      run: sh gradlew assembleDebug

    - name: Upload Real Installation APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-OS-Dynamic-Build
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
