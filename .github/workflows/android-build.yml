name: Build Android APK Automatically

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Compile Native Kotlin Application
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # الأداة السحرية الرسمية: تهيئة بيئة أندرويد وتوليد الـ SDK ومكونات البناء تلقائياً في السيرفر
    - name: Set up Android SDK & Environment
      uses: android-actions/setup-android@v3

    # توليد ملفات الـ Wrapper المحركة للبناء سحابياً من الصفر لتفادي النقص في مستودعك
    - name: Generate Official Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4

    - name: Grant Execute Permission for Gradle Scripts
      run: chmod +x gradlew

    # بناء وتجميع الحزمة التنفيذية للتطبيق بنجاح
    - name: Compile and Build Debug APK
      run: ./gradlew assembleDebug

    # إنشاء الإصدار الرسمي والرفع المباشر لصفحة الـ Releases
    - name: Create Global Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v2.0.0-release"
        name: "تطبيق الأندرويد الجاهز (تحديث تلقائي) 📱"
        body: "تم بناء نظام التشغيل الوكيل الذكي وتحديثه تلقائياً بواسطة خوادم GitHub Actions وهو متوافق مع كافة أجهزة الأندرويد."
        files: app/build/outputs/apk/debug/app-debug.apk
