name: Android AI-OS CI/CD Build Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Compile and Generate Installation APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17 (Required for modern Android Builds)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # الحل العبقري: تجديد وتوليد ملفات الـ Wrapper والـ Jar ثنائية المفعول داخل السيرفر تلقائياً
    - name: Download and Regenerate Missing Gradle Wrapper Jar
      run: |
        wget https://services.gradle.org/distributions/gradle-8.4-bin.zip
        unzip -q gradle-8.4-bin.zip
        mv gradle-8.4/lib/plugins/gradle-plugins-*.jar ./ 2>/dev/null || true
        gradle wrapper --gradle-version 8.4

    # منح صلاحيات التشغيل للملفات التي تم توليدها وتحديثها فوراً
    - name: Grant Execute Permission for All Gradle Scripts
      run: |
        find . -name "gradlew" -exec chmod +x {} +

    # التجميع الحقيقي والنهائي للتطبيق بعد اكتمال البيئة الهندسية
    - name: Compile and Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Real Installation APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-OS-Dynamic-Build
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
