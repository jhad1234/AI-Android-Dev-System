name: Build Android APK Automatically

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter Engine
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    # تخطي الأخطاء في حال كان المشروع أندرويد نيتف (Native) عبر جلب المكونات تلقائياً
    - name: Get Dependencies and Packages
      run: |
        if [ -f "pubspec.yaml" ]; then
          flutter pub get
        else
          echo "Native project detected or fallback initialization..."
        fi

    # بناء الحزمة الشاملة لكافة معماريات الهواتف (arm, arm64, x64)
    - name: Build APK for All Devices
      run: |
        if [ -f "pubspec.yaml" ]; then
          flutter build apk --release --target-platform android-arm,android-arm64,android-x64
        else
          # إذا لم يجد فلاتر، يقوم بالبناء عبر محرك أندرويد المدمج بأمان
          chmod +x gradlew || true
          ./gradlew assembleDebug
        fi

    # التحقق الذكي من المخرجات وتوجيه الملف للرفع
    - name: Verify APK Output and Prepare Artifact
      run: |
        mkdir -p output-apk/
        if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          cp build/app/outputs/flutter-apk/app-release.apk output-apk/AI-OS-App.apk
        elif [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          cp app/build/outputs/apk/debug/app-debug.apk output-apk/AI-OS-App.apk
        else
          echo "لم يتم العثور على ملف APK الناتج."
          exit 1
        fi

    # السحر الحقيقي: إنشاء إصدار رسمي (Release) برابط تثبيت مباشر دائم في مستودعك!
    - name: Update Release and Upload Installation APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v2.0.0-build"
        name: "تطبيق الأندرويد الجاهز (تحديث تلقائي) 📱"
        body: "تم بناء نظام التشغيل الوكيل الذكي وتحديثه تلقائياً بواسطة خوادم GitHub Actions وهو متوافق مع كافة أجهزة الأندرويد."
        files: output-apk/AI-OS-App.apk
