name: Android AI-OS CI/CD Build Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Compile and Generate Installation APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17 (Required for modern Android Builds)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # تعديل الصياغة لتكون متوافقة تماماً مع خادم Ubuntu وتجنب أخطاء التفسير
    - name: Grant Execute Permission for Existing Scripts
      run: |
        chmod +x ./gradlew || true

    # تشغيل البناء المباشر
    - name: Compile and Build Debug APK
      run: sh gradlew assembleDebug

    - name: Upload Real Installation APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-OS-Dynamic-Build
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
