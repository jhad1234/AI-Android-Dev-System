name: Build Android APK Automatically

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Compile Native Kotlin Application
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # تهيئة بيئة أندرويد الرسمية لبناء مشاريع الكوتلن
    - name: Set up Android SDK & Environment
      uses: android-actions/setup-android@v3

    # التعديل الاستراتيجي: قسر الخادم على التوليد الحي بدون كاش خلفي مكسور
    - name: Generate Official Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4 --no-daemon

    # كسر قفل الحماية عن كافة ملفات التشغيل المستحدثة
    - name: Grant Execute Permission for All Gradle Scripts
      run: |
        find . -name "gradlew" -exec chmod +x {} +

    # التجميع الحقيقي والكامل للملف التنفيذي الحقيقي للتطبيق مع أمر التنظيف
    - name: Compile and Build Debug APK
      run: ./gradlew clean assembleDebug --no-daemon

    # إنشاء الإصدار الرسمي والرفع المباشر لصفحة الـ Releases
    - name: Create Global Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "Latest-AI-OS-Build"
        name: "تطبيق الأندرويد الجاهز (تحديث تلقائي) 📱"
        body: "تم بناء نظام التشغيل الوكيل الذكي وتحديثه تلقائياً بواسطة خوادم GitHub Actions بنجاح وبدون كاش."
        files: app/build/outputs/apk/debug/app-debug.apk
